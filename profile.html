<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>505th - My Profile</title>
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="manifest" href="images/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey:"AIzaSyCYWrWE8-xBJsvh228xzcg5VOD7dIn48fg", authDomain:"th-website-91533.firebaseapp.com", projectId:"th-website-91533", storageBucket:"th-website-91533.firebasestorage.app", messagingSenderId:"1046139150142", appId:"1:1046139150142:web:01f409ae4a38c4f79d966f" };
        const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
        const auth = getAuth(app), db = getFirestore(app);
        let currentUser, currentUserData;

        function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

        const RANK_ABBR = {
            'O9 / Lieutenant General':'LtGen','O8 / Major General':'MajGen','O7 / Brigadier General':'BGen',
            'O6 / Colonel':'Col','O5 / Lieutenant Colonel':'LtCol','O4 / Major':'Maj',
            'O3 / Captain':'Capt','O2 / First Lieutenant':'1stLt','O1 / Second Lieutenant':'2ndLt',
            'E9 / Sergeant Major':'SgtMaj','E9 / Master Gunnery Sergeant':'MGySgt','E9 / First Sergeant':'1stSgt',
            'E8 / Master Sergeant':'MSgt','E7 / Gunnery Sergeant':'GySgt','E6 / Staff Sergeant':'SSgt',
            'E5 / Sergeant':'Sgt','E4 / Corporal':'Cpl','E3 / Lance Corporal':'LCpl',
            'E2 / Private First Class':'PFC','E1 / Private':'Pvt',
            'E9 / Master Chief Hospital Corpsman':'MCPO','E8 / Senior Chief Corpsman':'SCPO',
            'E7 / Chief Corpsman':'CPO','E6 / Corpsman First Class':'HM1','E5 / Corpsman Second Class':'HM2',
            'E4 / Corpsman Third Class':'HM3','E3 / Hospitalman':'HN','E2 / Hospitalman Apprentice':'HA',
            'E6 / Technical Sergeant':'TSgt','E5 / Staff Sergeant':'SSgt',
            'E4 / Senior Airman':'SrA','E3 / Airman First Class':'A1C','E2 / Airman':'Amn','E1 / Airman Basic':'AB',
            'Reservist':'Res'
        };
        function getRankAbbr(rank){ return RANK_ABBR[rank]||(rank?rank.split('/').pop().trim():''); }
        function formatMemberName(u){
            if(!u) return '—';
            const rankAbbr=getRankAbbr(u.rank||'');
            const first=(u.firstName||'').trim();
            const last=(u.lastName||'').trim();
            const callsign=(u.callsign||'').trim();
            const firstInit=first?first.charAt(0).toUpperCase()+'.':'';
            const hasCallsign=callsign&&callsign!==first&&callsign!==(first+' '+last);
            let name='';
            if(firstInit) name+=firstInit+' ';
            if(hasCallsign) name+='"'+callsign+'"';
            else if(last) name+=last;
            else if(callsign) name+='"'+callsign+'"';
            return [rankAbbr,name.trim()].filter(Boolean).join(' ');
        }

        function calcTimeInUnit(joinedAt) {
            if(!joinedAt) return 'N/A';
            const joined = new Date(joinedAt);
            const now = new Date();
            const totalDays = Math.floor((now - joined) / (1000*60*60*24));
            const years = Math.floor(totalDays / 365);
            const months = Math.floor((totalDays % 365) / 30);
            const days = totalDays % 30;
            let parts = [];
            if(years > 0)  parts.push(years  + ' yr'  + (years  !== 1 ? 's' : ''));
            if(months > 0) parts.push(months + ' mo'  + (months !== 1 ? 's' : ''));
            if(!years && days > 0) parts.push(days + ' day' + (days !== 1 ? 's' : ''));
            return parts.join(' ') || 'Just joined';
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const ud = await getDoc(doc(db, 'users', user.uid));
            if (!ud.exists()) { window.location.href = 'login.html'; return; }
            currentUser = user;
            currentUserData = ud.data();
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('profileApp').classList.remove('hidden');
            fillProfile();
        });

        function fillProfile() {
            const d = currentUserData;

            // ── Dossier Header ──
            document.getElementById('hdrCallsign').textContent  = formatMemberName(d) || d.callsign || 'UNKNOWN';
            document.getElementById('hdrRank').textContent      = d.rank ? getRankAbbr(d.rank)+' — '+d.rank.split('/').pop().trim() : 'Unranked';
            document.getElementById('hdrPlatoon').textContent   = d.platoon || '—';
            document.getElementById('hdrTimeUnit').textContent  = calcTimeInUnit(d.joinedAt);
            document.getElementById('hdrJoinDate').textContent  = d.joinedAt ? new Date(d.joinedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : 'Not Set';

            const roleEl = document.getElementById('hdrRole');
            roleEl.textContent  = (d.role || 'N/A').toUpperCase().replace('_',' ');
            roleEl.className    = 'role-badge role-' + (d.role||'');

            // Status dot
            const statusEl = document.getElementById('hdrStatus');
            const isReserve = d.platoon==='Reserves';
            const isInactive = d.status==='inactive';
            statusEl.textContent  = isInactive ? '● INACTIVE' : isReserve ? '● RESERVE' : '● ACTIVE';
            statusEl.style.color  = isInactive ? '#ef4444' : isReserve ? '#FFD700' : '#00FF41';

            // ── Personal Info ──
            document.getElementById('infoFirst').textContent  = d.firstName  || '—';
            document.getElementById('infoLast').textContent   = d.lastName   || '—';
            document.getElementById('infoEmail').textContent  = d.email      || '—';

            // Editable inputs
            document.getElementById('inputFirst').value  = d.firstName  || '';
            document.getElementById('inputMiddle').value = d.middleName || '';
            document.getElementById('inputLast').value   = d.lastName   || '';

            // ── Medals ──
            renderMedals(d.commendationHistory || []);

            // ── Promotion History ──
            renderPromoHistory(d.promotionHistory || []);

            // ── Platoon History ──
            renderPlatoonHistory(d.platoonHistory || []);

            // Show Command Terminal for admin roles
            if(ADMIN_ROLES.includes(d.role)) {
                document.getElementById('cmdTerminalBtn').style.display = 'inline-flex';
            }
        }

        function renderMedals(entries) {
            const c = document.getElementById('medalsGrid');
            const awards = entries.filter(e => e.title);
            if(!awards.length){
                c.innerHTML = '<div class="empty-state">NO MEDALS OR AWARDS</div>';
                return;
            }
            c.innerHTML = awards.map(e => {
                const img = e.medalImg
                    ? `<img src="images/medal_emojis/${esc(e.medalImg)}" alt="${esc(e.title)}">`
                    : `<div class="medal-custom-icon">&#9733;</div>`;
                return `<div class="medal-card">
                    <div class="medal-img-wrap">${img}</div>
                    <div class="medal-title">${esc(e.title)}</div>
                    ${e.note ? `<div class="medal-note">${esc(e.note)}</div>` : ''}
                    <div class="medal-date">${e.date||''}</div>
                </div>`;
            }).join('');
        }

        function renderPromoHistory(entries) {
            const c = document.getElementById('promoTimeline');
            if(!entries.length){
                c.innerHTML = '<div class="empty-state">NO PROMOTION HISTORY</div>';
                return;
            }
            c.innerHTML = [...entries].reverse().map(e => `
                <div class="timeline-entry">
                    <div class="timeline-dot promo-dot"></div>
                    <div class="timeline-body">
                        <div class="tl-ranks">${esc(e.fromRank||'—')} <span class="tl-arrow">→</span> <span class="tl-rank-to">${esc(e.toRank||'—')}</span></div>
                        ${e.note ? `<div class="tl-note">${esc(e.note)}</div>` : ''}
                        <div class="tl-meta">${e.date||''}${e.addedBy&&!e.auto ? ` · by ${esc(e.addedBy)}` : ''}${e.auto ? ' · <span class="tl-auto">auto</span>' : ''}</div>
                    </div>
                </div>`).join('');
        }

        function renderPlatoonHistory(entries) {
            const c = document.getElementById('platoonTimeline');
            if(!entries.length){
                c.innerHTML = '<div class="empty-state">NO TRANSFER HISTORY</div>';
                return;
            }
            c.innerHTML = [...entries].reverse().map(e => `
                <div class="timeline-entry">
                    <div class="timeline-dot platoon-dot"></div>
                    <div class="timeline-body">
                        <div class="tl-ranks">${esc(e.from||'—')} <span class="tl-arrow">→</span> <span class="tl-platoon-to">${esc(e.to||'—')}</span></div>
                        ${e.note ? `<div class="tl-note">${esc(e.note)}</div>` : ''}
                        <div class="tl-meta">${e.date||''}${e.addedBy&&!e.auto ? ` · by ${esc(e.addedBy)}` : ''}${e.auto ? ' · <span class="tl-auto">auto</span>' : ''}</div>
                    </div>
                </div>`).join('');
        }

        window.saveProfile = async function() {
            const first  = document.getElementById('inputFirst').value.trim();
            const middle = document.getElementById('inputMiddle').value.trim();
            const last   = document.getElementById('inputLast').value.trim();
            // Only update name fields — never touch callsign (set by admin only)
            const updates = { firstName: first, middleName: middle, lastName: last };
            try {
                await updateDoc(doc(db, 'users', currentUser.uid), updates);
                currentUserData = { ...currentUserData, ...updates };
                fillProfile();
                showNotify('PROFILE UPDATED');
            } catch(e) { showNotify('ERROR: '+e.message, true); }
        };

        function showNotify(msg, err=false) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.className = 'notification show' + (err ? ' error' : '');
            setTimeout(() => n.className = 'notification', 3000);
        }

        window.handleLogout = async function() { await signOut(auth); window.location.href = 'home.html'; };

        const ADMIN_ROLES = ['commander','developer','staff_nco','nco','recruiter'];
    </script>
    <style>
        :root{--accent:#00D9FF;--accent-glow:rgba(0,217,255,.5);--success:#00FF41}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Share Tech Mono',monospace;background:linear-gradient(180deg,#0A0E12,#050709);color:#c0c0c0;min-height:100vh}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 50px,rgba(0,217,255,.03) 50px,rgba(0,217,255,.03) 51px),repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(0,217,255,.03) 50px,rgba(0,217,255,.03) 51px);opacity:.3;pointer-events:none;z-index:0}
        .scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,.12),rgba(0,0,0,.12) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:9999}
        .hidden{display:none!important}
        .loading-screen{display:flex;justify-content:center;align-items:center;height:100vh;color:var(--accent);font-size:14px;letter-spacing:4px;z-index:10}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes scanIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

        /* ── Top bar ── */
        .top-bar{background:rgba(8,10,14,.95);border-bottom:1px solid rgba(0,217,255,.4);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
        .top-bar-left{display:flex;align-items:center;gap:12px}
        .top-bar-left img{width:32px;height:32px;filter:drop-shadow(0 0 8px var(--accent-glow))}
        .top-bar-title{font-family:'Rajdhani',sans-serif;color:var(--accent);font-size:16px;font-weight:700;letter-spacing:3px;text-shadow:0 0 10px var(--accent-glow)}
        .top-bar-right{display:flex;align-items:center;gap:10px}
        .top-btn{background:transparent;border:1px solid rgba(0,217,255,.6);color:#bebebe;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:7px 14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
        .top-btn:hover{border-color:var(--accent);color:var(--accent)}
        .logout-btn:hover{border-color:#ef4444;color:#ef4444}

        /* ── Layout ── */
        .profile-container{max-width:960px;margin:32px auto;padding:0 20px;position:relative;z-index:1;animation:scanIn .4s ease-out}

        /* ── Dossier Header ── */
        .dossier-card{background:rgba(8,10,14,.85);border:1px solid rgba(0,217,255,.35);padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden}
        .dossier-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
        .dossier-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
        .dossier-identity{flex:1}
        .dossier-callsign{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:#fff;letter-spacing:4px;text-shadow:0 0 20px var(--accent-glow);line-height:1}
        .dossier-rank{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:var(--accent);letter-spacing:3px;margin-top:6px;text-shadow:0 0 8px var(--accent-glow)}
        .dossier-platoon{font-family:'Rajdhani',sans-serif;font-size:13px;color:#aaa;letter-spacing:2px;margin-top:3px}
        .dossier-badges{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
        .role-badge{font-size:10px;letter-spacing:2px;padding:3px 10px;border:1px solid #333;color:#bbb;font-family:'Rajdhani',sans-serif;font-weight:700}
        .role-commander{color:#f59e0b;border-color:#f59e0b55;background:rgba(245,158,11,.07)}
        .role-developer{color:#a78bfa;border-color:#a78bfa55;background:rgba(167,139,250,.07)}
        .role-staff_nco{color:#2DD4BF;border-color:#2DD4BF55;background:rgba(45,212,191,.07)}
        .role-recruiter{color:#fb923c;border-color:#fb923c55;background:rgba(251,146,60,.07)}
        .role-nco{color:#34d399;border-color:#34d39955;background:rgba(52,211,153,.07)}
        .role-marine{color:#94a3b8;border-color:#94a3b855;background:rgba(148,163,184,.07)}
        .role-enlistee{color:#64748b;border-color:#64748b55;background:rgba(100,116,139,.07)}
        .status-pill{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px}
        .dossier-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.25);align-self:stretch;min-width:200px}
        .dossier-stat{background:rgba(8,10,14,.9);padding:12px 16px}
        .dossier-stat-label{font-size:8px;letter-spacing:2px;color:rgba(0,217,255,.6);margin-bottom:4px}
        .dossier-stat-val{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#e0e0e0;letter-spacing:1px}
        .dossier-divider{border:none;border-top:1px solid rgba(0,217,255,.15);margin:16px 0 0}

        /* ── Two-column grid ── */
        .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
        @media(max-width:680px){.profile-grid{grid-template-columns:1fr}}

        /* ── Profile card ── */
        .profile-card{background:rgba(8,10,14,.8);border:1px solid rgba(0,217,255,.3);padding:20px}
        .profile-card.full{grid-column:1/-1}
        .card-title{font-family:'Rajdhani',sans-serif;color:var(--accent);font-size:13px;font-weight:700;letter-spacing:3px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(0,217,255,.25);text-shadow:0 0 10px var(--accent-glow)}
        .info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
        .info-label{color:rgba(0,217,255,.6);font-size:9px;letter-spacing:2px}
        .info-value{color:#e0e0e0;font-size:11px;text-align:right}

        /* ── Edit name ── */
        .edit-field{margin-bottom:10px}
        .edit-field label{display:block;color:rgba(0,217,255,.55);font-size:8px;letter-spacing:2px;margin-bottom:4px}
        .edit-field input{width:100%;padding:9px 10px;background:rgba(0,0,0,.5);border:1px solid rgba(0,217,255,.2);color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;transition:border-color .2s}
        .edit-field input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(0,217,255,.1)}
        .name-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
        @media(max-width:500px){.name-row{grid-template-columns:1fr}}
        .save-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;padding:10px 24px;cursor:pointer;transition:all .2s;margin-top:6px;text-shadow:0 0 8px var(--accent-glow)}
        .save-btn:hover{background:rgba(0,217,255,.08);box-shadow:0 0 16px rgba(0,217,255,.15)}

        /* ── Medals ── */
        .medals-grid{display:flex;flex-wrap:wrap;gap:10px}
        .medal-card{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 8px;background:rgba(0,0,0,.3);border:1px solid rgba(167,139,250,.2);min-width:72px;max-width:90px;transition:border-color .2s}
        .medal-card:hover{border-color:rgba(167,139,250,.6);box-shadow:0 0 10px rgba(167,139,250,.1)}
        .medal-img-wrap img{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(167,139,250,.5))}
        .medal-custom-icon{font-size:32px;color:#a78bfa;opacity:.8;line-height:1;text-shadow:0 0 10px rgba(167,139,250,.5)}
        .medal-title{font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:.5px;color:#a78bfa;text-align:center;line-height:1.3;text-shadow:0 0 6px rgba(167,139,250,.4)}
        .medal-note{font-size:7px;color:#888;text-align:center;line-height:1.3;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .medal-date{font-size:7px;color:rgba(0,217,255,.4);letter-spacing:1px}

        /* ── Timeline ── */
        .timeline{display:flex;flex-direction:column;gap:0}
        .timeline-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);position:relative}
        .timeline-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
        .promo-dot{background:#7FFF7F;box-shadow:0 0 8px rgba(127,255,127,.7)}
        .platoon-dot{background:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
        .timeline-body{flex:1}
        .tl-ranks{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:#d0d0d0;letter-spacing:.5px}
        .tl-arrow{color:#555;margin:0 6px}
        .tl-rank-to{color:#7FFF7F;text-shadow:0 0 6px rgba(127,255,127,.4)}
        .tl-platoon-to{color:var(--accent);text-shadow:0 0 6px var(--accent-glow)}
        .tl-note{color:#aaa;font-size:9px;margin-top:2px;letter-spacing:.5px}
        .tl-meta{color:rgba(0,217,255,.35);font-size:8px;letter-spacing:1px;margin-top:3px}
        .tl-auto{color:rgba(0,217,255,.2);font-style:italic}

        .empty-state{color:#aaa;font-size:9px;letter-spacing:3px;text-align:center;padding:16px 0}
        .notification{position:fixed;top:60px;right:20px;background:rgba(8,10,14,.97);border:1px solid var(--accent);color:var(--accent);padding:12px 20px;font-size:11px;letter-spacing:2px;z-index:200;opacity:0;transform:translateX(20px);transition:all .3s;pointer-events:none}
        .notification.show{opacity:1;transform:translateX(0)}
        .notification.error{border-color:#ef4444;color:#ef4444}
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="loading-screen" id="loadingScreen">LOADING DOSSIER<span style="animation:blink 1s infinite">_</span></div>
    <div class="notification" id="notification"></div>

    <div id="profileApp" class="hidden">
        <div class="top-bar">
            <div class="top-bar-left">
                <img src="images/logo.png" alt="505th">
                <span class="top-bar-title">OPERATIVE DOSSIER_</span>
            </div>
            <div class="top-bar-right">
                <a href="home.html" class="top-btn">&#8962; HOME</a>
                <a href="admin.html" id="cmdTerminalBtn" class="top-btn" style="display:none;color:var(--accent);border-color:rgba(0,217,255,.5)">&#9632; COMMAND TERMINAL</a>
                <button class="top-btn logout-btn" onclick="handleLogout()">&#9211; LOGOUT</button>
            </div>
        </div>

        <div class="profile-container">

            <!-- ── DOSSIER HEADER ── -->
            <div class="dossier-card">
                <div class="dossier-top">
                    <div class="dossier-identity">
                        <div class="dossier-callsign" id="hdrCallsign">---</div>
                        <div class="dossier-rank" id="hdrRank">---</div>
                        <div class="dossier-platoon" id="hdrPlatoon">---</div>
                        <div class="dossier-badges">
                            <span id="hdrRole" class="role-badge">---</span>
                            <span id="hdrStatus" class="status-pill">---</span>
                        </div>
                    </div>
                    <div class="dossier-stats">
                        <div class="dossier-stat">
                            <div class="dossier-stat-label">DATE JOINED</div>
                            <div class="dossier-stat-val" id="hdrJoinDate">---</div>
                        </div>
                        <div class="dossier-stat">
                            <div class="dossier-stat-label">TIME IN UNIT</div>
                            <div class="dossier-stat-val" id="hdrTimeUnit">---</div>
                        </div>
                    </div>
                </div>
                <hr class="dossier-divider">
            </div>

            <!-- ── TWO COLUMN: Personal Info + Medals ── -->
            <div class="profile-grid">
                <!-- Personal Info -->
                <div class="profile-card">
                    <div class="card-title">&#9998; PERSONAL INFO</div>
                    <div class="info-row"><span class="info-label">FIRST NAME</span><span class="info-value" id="infoFirst">—</span></div>
                    <div class="info-row"><span class="info-label">LAST NAME</span><span class="info-value" id="infoLast">—</span></div>
                    <div class="info-row"><span class="info-label">EMAIL</span><span class="info-value" id="infoEmail">—</span></div>
                    <hr style="border:none;border-top:1px solid rgba(0,217,255,.08);margin:14px 0">
                    <div class="card-title" style="margin-bottom:10px">EDIT NAME</div>
                    <div class="name-row">
                        <div class="edit-field"><label>FIRST</label><input type="text" id="inputFirst" placeholder="First..."></div>
                        <div class="edit-field"><label>MIDDLE</label><input type="text" id="inputMiddle" placeholder="Middle..."></div>
                        <div class="edit-field"><label>LAST</label><input type="text" id="inputLast" placeholder="Last..."></div>
                    </div>
                    <button class="save-btn" onclick="saveProfile()">SAVE CHANGES</button>
                </div>

                <!-- Medals -->
                <div class="profile-card">
                    <div class="card-title">&#9733; MEDALS &amp; AWARDS</div>
                    <div class="medals-grid" id="medalsGrid">
                        <div class="empty-state">NO MEDALS OR AWARDS</div>
                    </div>
                </div>
            </div>

            <!-- ── PROMOTION HISTORY ── -->
            <div class="profile-card full" style="margin-bottom:16px">
                <div class="card-title">&#9650; PROMOTION HISTORY</div>
                <div class="timeline" id="promoTimeline">
                    <div class="empty-state">NO PROMOTION HISTORY</div>
                </div>
            </div>

            <!-- ── PLATOON / TRANSFER HISTORY ── -->
            <div class="profile-card full" style="margin-bottom:32px">
                <div class="card-title">&#8644; PLATOON / TRANSFER HISTORY</div>
                <div class="timeline" id="platoonTimeline">
                    <div class="empty-state">NO TRANSFER HISTORY</div>
                </div>
            </div>

        </div>
    </div>
    
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
