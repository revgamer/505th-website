<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>505th - Initializing</title>

    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="manifest" href="images/site.webmanifest">

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/splash.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYWrWE8-xBJsvh228xzcg5VOD7dIn48fg",
            authDomain: "th-website-91533.firebaseapp.com",
            projectId: "th-website-91533",
            storageBucket: "th-website-91533.firebasestorage.app",
            messagingSenderId: "1046139150142",
            appId: "1:1046139150142:web:01f409ae4a38c4f79d966f"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        const ADMIN_ROLES = ['commander', 'developer', 'staff_nco', 'nco', 'recruiter'];

        const CONFIG = {
            terminalDelay:   200,
            loadingDuration: 3000,
            redirectDelay:   1000,
        };

        // Destination resolved async — animation runs in parallel
        let destination = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists()) {
                window.location.href = 'login.html';
                return;
            }

            const userData = userDoc.data();

            // Populate operator name + role in terminal
            const nameEl = document.getElementById('operatorName');
            const roleEl = document.getElementById('operatorRole');
            if (nameEl) nameEl.textContent = userData.callsign || '---';
            if (roleEl) roleEl.textContent  = (userData.role || '---').toUpperCase();

            if (ADMIN_ROLES.includes(userData.role)) {
                // Admin roles always go to admin panel
                destination = 'admin.html';
            } else {
                // Enlistee / marine — return to page they were on before login
                // Falls back to home.html if nothing was saved
                const returnUrl = sessionStorage.getItem('returnUrl') || 'home.html';
                sessionStorage.removeItem('returnUrl'); // clear after use
                destination = returnUrl;
            }
        });

        // ── Boot animation starts immediately on load — no press enter ────
        window.addEventListener('DOMContentLoaded', () => {
            showTerminalLines();
        });

        function showTerminalLines() {
            const lines = document.querySelectorAll('.terminal-line');
            let i = 0;

            function showNext() {
                if (i < lines.length) {
                    lines[i].classList.add('show');
                    if (i > 0) lines[i - 1].classList.remove('typing');
                    if (i < lines.length - 1) lines[i].classList.add('typing');
                    i++;
                    setTimeout(showNext, CONFIG.terminalDelay);
                } else {
                    if (lines.length > 0) lines[lines.length - 1].classList.remove('typing');
                    setTimeout(startLoadingBar, 500);
                }
            }
            showNext();
        }

        function startLoadingBar() {
            const loadingContainer = document.querySelector('.loading-container');
            const bar    = document.getElementById('progress');
            const pct    = document.getElementById('percentage');
            const status = document.getElementById('status');

            loadingContainer.classList.add('show');
            status.classList.add('show');

            let current = 0;
            const interval  = 50;
            const increment = (100 / CONFIG.loadingDuration) * interval;

            function tick() {
                current += increment;
                if (current > 100) current = 100;

                bar.style.width = current + '%';
                pct.textContent = Math.floor(current) + '%';

                if (current >= 95) {
                    status.textContent      = 'ACCESS GRANTED';
                    status.style.color      = '#00FF41';
                    status.style.textShadow = '0 0 15px #00FF41';
                } else if (current >= 75) {
                    status.textContent      = 'LOADING COMMAND TERMINAL...';
                    status.style.color      = '';
                    status.style.textShadow = '';
                } else if (current >= 50) {
                    status.textContent = 'LOADING PROFILE...';
                } else if (current >= 25) {
                    status.textContent = 'ESTABLISHING CONNECTION...';
                } else {
                    status.textContent = 'STAND BY...';
                }

                if (current < 100) {
                    setTimeout(tick, interval);
                } else {
                    onLoadingComplete();
                }
            }
            tick();
        }

        function onLoadingComplete() {
            setTimeout(() => {
                // If Firebase hasn't resolved yet, wait a bit longer
                if (!destination) {
                    setTimeout(onLoadingComplete, 500);
                    return;
                }
                const bootSequence = document.getElementById('bootSequence');
                bootSequence.style.animation = 'fadeOut 1s ease-out forwards';
                setTimeout(() => {
                    window.location.href = destination;
                }, 1000);
            }, CONFIG.redirectDelay);
        }
    </script>
</head>
<body>
    <div class="splash-container">
        <div class="scanlines"></div>

        <!-- Straight into boot sequence — no Stage 1 press enter screen -->
        <div class="boot-sequence active" id="bootSequence">
            <div class="terminal">
                <div class="terminal-line"><span class="prompt">&gt;</span> UNSC TACTICAL NETWORK v4.2.1</div>
                <div class="terminal-line"><span class="prompt">&gt;</span> INITIALIZING SECURE CONNECTION...</div>
                <div class="terminal-line"><span class="prompt">&gt;</span> OPERATOR: <span class="success" id="operatorName">---</span></div>
                <div class="terminal-line"><span class="prompt">&gt;</span> CLEARANCE: <span class="success" id="operatorRole">---</span></div>
                <div class="terminal-line"><span class="prompt">&gt;</span> AUTHENTICATION: <span class="success">VERIFIED</span></div>
                <div class="terminal-line"><span class="prompt">&gt;</span> SECURITY CLEARANCE: <span class="success">GRANTED</span></div>
                <div class="terminal-line"><span class="prompt">&gt;</span> LOADING PERSONNEL DATABASE...</div>
                <div class="terminal-line"><span class="prompt">&gt;</span> ACCESSING COMMAND TERMINAL...</div>
            </div>

            <div class="loading-container">
                <div class="loading-label">LOADING SYSTEM</div>
                <div class="loading-bar">
                    <div class="loading-progress" id="progress"></div>
                </div>
                <div class="loading-percentage" id="percentage">0%</div>
            </div>

            <div class="status-message" id="status">STAND BY...</div>
        </div>
    </div>

    <noscript>
        <meta http-equiv="refresh" content="0;url=login.html">
    </noscript>
        <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <script type="module" src="js/speed-insights.js"></script>
</body>
</html>
